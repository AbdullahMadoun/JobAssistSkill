name: job-assist-skill
version: 3.2.0
description: Agent-operated skill for LinkedIn dual-stream scraping, staged prompt packaging, local CV compilation, and email draft generation.
author: Abdullah Madoun
tags:
  - job-search
  - linkedin
  - cv-tailoring
  - agent-skill
  - playwright
triggers:
  - job search
  - scrape linkedin
  - tailor cv
  - cover letter prompt
  - application email
inputs:
  query:
    type: string
    description: Freeform role or job search query
    required: false
  cv_template:
    type: file
    description: User's LaTeX CV template
    required: false
  linkedin_session:
    type: file
    description: Saved LinkedIn browser session JSON
    required: false
outputs:
  search_results:
    type: file
    description: Normalized JSON results from the jobs and/or posts streams
  tailoring_context:
    type: file
    description: Prompt package JSON for agent-driven CV tailoring
  tailored_cv:
    type: file
    description: Tailored LaTeX CV ready for compilation
  email_draft:
    type: file
    description: Local JSON draft for application outreach
requires:
  python: "3.10+"
  playwright: installed
  linkedin_session: path to LinkedIn session.json for scraping
  latex_distribution: optional, only needed for PDF compilation
config:
  default_stream: both
  default_limit: 10
  output_dir: output
memory:
  file: .job_assist/preferences.json
  purpose: Stores user profile, preferred searches, sender information, and workflow defaults
